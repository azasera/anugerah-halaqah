<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sync & Clean Data</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 p-8">
    <div class="max-w-6xl mx-auto">
        <div class="bg-white rounded-lg shadow-lg p-6 mb-6">
            <h1 class="text-2xl font-bold text-gray-800 mb-4">🔄 Sync & Clean Data</h1>
            <p class="text-gray-600 mb-4">Tool untuk sinkronisasi dan membersihkan data yang tidak konsisten</p>
        </div>

        <!-- Status -->
        <div class="grid grid-cols-3 gap-6 mb-6">
            <div class="bg-white rounded-lg shadow-lg p-6">
                <h3 class="text-lg font-bold text-gray-800 mb-2">📦 Local Data</h3>
                <div id="localCount" class="text-4xl font-bold text-blue-600">-</div>
                <div class="text-sm text-gray-500">santri</div>
            </div>

            <div class="bg-white rounded-lg shadow-lg p-6">
                <h3 class="text-lg font-bold text-gray-800 mb-2">☁️ Supabase Data</h3>
                <div id="supabaseCount" class="text-4xl font-bold text-purple-600">-</div>
                <div class="text-sm text-gray-500">santri</div>
            </div>

            <div class="bg-white rounded-lg shadow-lg p-6">
                <h3 class="text-lg font-bold text-gray-800 mb-2">⚠️ Difference</h3>
                <div id="diffCount" class="text-4xl font-bold text-red-600">-</div>
                <div class="text-sm text-gray-500">santri</div>
            </div>
        </div>

        <!-- Actions -->
        <div class="bg-white rounded-lg shadow-lg p-6 mb-6">
            <h2 class="text-xl font-bold text-gray-800 mb-4">Aksi</h2>
            
            <div class="grid grid-cols-2 gap-4">
                <button onclick="analyzeData()" 
                    class="bg-blue-600 text-white px-6 py-3 rounded-lg font-bold hover:bg-blue-700 transition-colors">
                    🔍 Analyze Data
                </button>

                <button onclick="syncSupabaseToLocal()" 
                    class="bg-purple-600 text-white px-6 py-3 rounded-lg font-bold hover:bg-purple-700 transition-colors">
                    ⬇️ Sync Supabase → Local
                </button>

                <button onclick="syncLocalToSupabase()" 
                    class="bg-green-600 text-white px-6 py-3 rounded-lg font-bold hover:bg-green-700 transition-colors">
                    ⬆️ Sync Local → Supabase
                </button>

                <button onclick="forceSupabaseAsSource()" 
                    class="bg-orange-600 text-white px-6 py-3 rounded-lg font-bold hover:bg-orange-700 transition-colors">
                    🔨 Force: Supabase as Source
                </button>

                <button onclick="removeOrphans()" 
                    class="bg-red-600 text-white px-6 py-3 rounded-lg font-bold hover:bg-red-700 transition-colors">
                    🗑️ Remove Orphan Data
                </button>

                <button onclick="clearLocalStorage()" 
                    class="bg-gray-600 text-white px-6 py-3 rounded-lg font-bold hover:bg-gray-700 transition-colors">
                    💣 Clear Local Storage
                </button>
            </div>
        </div>

        <!-- Analysis Results -->
        <div class="bg-white rounded-lg shadow-lg p-6 mb-6">
            <h2 class="text-xl font-bold text-gray-800 mb-4">📊 Analysis Results</h2>
            <div id="analysisResults" class="bg-gray-100 p-4 rounded font-mono text-xs h-96 overflow-y-auto">
                <div class="text-gray-500">Klik "Analyze Data" untuk melihat hasil analisis</div>
            </div>
        </div>

        <!-- Log Output -->
        <div class="bg-gray-900 rounded-lg shadow-lg p-6">
            <h2 class="text-xl font-bold text-white mb-4">📋 Log Output</h2>
            <div id="logOutput" class="bg-black text-green-400 p-4 rounded font-mono text-sm h-96 overflow-y-auto">
                <div>Menunggu aksi...</div>
            </div>
            <button onclick="clearLog()" 
                class="mt-4 bg-gray-700 text-white px-4 py-2 rounded hover:bg-gray-600 transition-colors">
                Clear Log
            </button>
        </div>
    </div>

    <script src="js/settings.js"></script>
    <script src="js/data.js"></script>
    <script src="js/supabase.js"></script>
    
    <script>
        // Override console.log
        const originalLog = console.log;
        const originalError = console.error;
        
        function addLog(message, type = 'info') {
            const logDiv = document.getElementById('logOutput');
            const timestamp = new Date().toLocaleTimeString();
            const color = type === 'error' ? 'text-red-400' : type === 'success' ? 'text-green-400' : type === 'warning' ? 'text-yellow-400' : 'text-blue-400';
            logDiv.innerHTML += `<div class="${color}">[${timestamp}] ${message}</div>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        console.log = function(...args) {
            originalLog.apply(console, args);
            addLog(args.join(' '), 'info');
        };

        console.error = function(...args) {
            originalError.apply(console, args);
            addLog('ERROR: ' + args.join(' '), 'error');
        };

        // Initialize
        async function init() {
            try {
                if (!window.supabaseClient) {
                    addLog('Initializing Supabase...', 'info');
                    await initializeSupabase();
                    addLog('✅ Supabase initialized', 'success');
                }
                
                updateCounts();
            } catch (error) {
                addLog('❌ Init failed: ' + error.message, 'error');
            }
        }

        // Update counts
        function updateCounts() {
            const localCount = dashboardData.students ? dashboardData.students.length : 0;
            document.getElementById('localCount').textContent = localCount;
            
            // Supabase count will be updated after fetch
        }

        // Analyze Data
        async function analyzeData() {
            addLog('='.repeat(50), 'info');
            addLog('🔍 ANALYZING DATA', 'warning');
            addLog('='.repeat(50), 'info');

            const resultsDiv = document.getElementById('analysisResults');
            resultsDiv.innerHTML = '<div class="text-blue-600">Analyzing...</div>';

            try {
                // Get local data
                const localStudents = dashboardData.students || [];
                const localIds = new Set(localStudents.map(s => parseInt(s.id)));
                addLog('Local students: ' + localStudents.length, 'info');

                // Get Supabase data
                const { data: supabaseStudents, error } = await window.supabaseClient
                    .from('students')
                    .select('id, name, halaqah');

                if (error) throw error;

                const supabaseIds = new Set(supabaseStudents.map(s => parseInt(s.id)));
                addLog('Supabase students: ' + supabaseStudents.length, 'info');

                // Update counts
                document.getElementById('localCount').textContent = localStudents.length;
                document.getElementById('supabaseCount').textContent = supabaseStudents.length;
                document.getElementById('diffCount').textContent = Math.abs(localStudents.length - supabaseStudents.length);

                // Find differences
                const onlyInLocal = localStudents.filter(s => !supabaseIds.has(parseInt(s.id)));
                const onlyInSupabase = supabaseStudents.filter(s => !localIds.has(parseInt(s.id)));

                addLog('Only in Local: ' + onlyInLocal.length, 'warning');
                addLog('Only in Supabase: ' + onlyInSupabase.length, 'warning');

                // Display results
                let html = `
                    <div class="mb-4">
                        <div class="font-bold text-lg mb-2">📊 Summary</div>
                        <div>Local: ${localStudents.length} santri</div>
                        <div>Supabase: ${supabaseStudents.length} santri</div>
                        <div>Difference: ${Math.abs(localStudents.length - supabaseStudents.length)} santri</div>
                    </div>
                `;

                if (onlyInLocal.length > 0) {
                    html += `
                        <div class="mb-4 p-3 bg-yellow-50 rounded border border-yellow-200">
                            <div class="font-bold text-yellow-800 mb-2">⚠️ Only in Local (${onlyInLocal.length})</div>
                            <div class="text-xs space-y-1">
                    `;
                    onlyInLocal.slice(0, 10).forEach(s => {
                        html += `<div>ID: ${s.id} - ${s.name} (${s.halaqah})</div>`;
                    });
                    if (onlyInLocal.length > 10) {
                        html += `<div class="text-gray-500">... and ${onlyInLocal.length - 10} more</div>`;
                    }
                    html += `</div></div>`;
                }

                if (onlyInSupabase.length > 0) {
                    html += `
                        <div class="mb-4 p-3 bg-blue-50 rounded border border-blue-200">
                            <div class="font-bold text-blue-800 mb-2">ℹ️ Only in Supabase (${onlyInSupabase.length})</div>
                            <div class="text-xs space-y-1">
                    `;
                    onlyInSupabase.slice(0, 10).forEach(s => {
                        html += `<div>ID: ${s.id} - ${s.name} (${s.halaqah})</div>`;
                    });
                    if (onlyInSupabase.length > 10) {
                        html += `<div class="text-gray-500">... and ${onlyInSupabase.length - 10} more</div>`;
                    }
                    html += `</div></div>`;
                }

                if (onlyInLocal.length === 0 && onlyInSupabase.length === 0) {
                    html += `<div class="p-3 bg-green-50 rounded border border-green-200 text-green-800 font-bold">✅ Data is in sync!</div>`;
                }

                resultsDiv.innerHTML = html;
                addLog('✅ Analysis completed', 'success');

            } catch (error) {
                resultsDiv.innerHTML = `<div class="text-red-600">❌ Error: ${error.message}</div>`;
                addLog('❌ Analysis failed: ' + error.message, 'error');
            }
        }

        // Sync Supabase to Local
        async function syncSupabaseToLocal() {
            if (!confirm('Ini akan mengganti data lokal dengan data dari Supabase. Lanjutkan?')) {
                return;
            }

            addLog('='.repeat(50), 'info');
            addLog('⬇️ SYNCING SUPABASE → LOCAL', 'warning');
            addLog('='.repeat(50), 'info');

            try {
                // Clear delete flag to allow loading
                localStorage.removeItem('_deleteJustDone');
                window.deleteOperationInProgress = false;

                // Load from Supabase
                await loadStudentsFromSupabase();
                
                addLog('✅ Sync completed', 'success');
                updateCounts();
                
                // Auto analyze
                setTimeout(() => analyzeData(), 1000);
            } catch (error) {
                addLog('❌ Sync failed: ' + error.message, 'error');
            }
        }

        // Sync Local to Supabase
        async function syncLocalToSupabase() {
            if (!confirm('Ini akan upload data lokal ke Supabase. Lanjutkan?')) {
                return;
            }

            addLog('='.repeat(50), 'info');
            addLog('⬆️ SYNCING LOCAL → SUPABASE', 'warning');
            addLog('='.repeat(50), 'info');

            try {
                await syncStudentsToSupabase();
                
                addLog('✅ Sync completed', 'success');
                
                // Auto analyze
                setTimeout(() => analyzeData(), 1000);
            } catch (error) {
                addLog('❌ Sync failed: ' + error.message, 'error');
            }
        }

        // Force Supabase as Source
        async function forceSupabaseAsSource() {
            if (!confirm('⚠️ PERINGATAN!\n\nIni akan:\n1. Menghapus SEMUA data lokal\n2. Download ulang dari Supabase\n3. Data lokal yang tidak ada di Supabase akan HILANG\n\nLanjutkan?')) {
                return;
            }

            addLog('='.repeat(50), 'info');
            addLog('🔨 FORCE: SUPABASE AS SOURCE', 'warning');
            addLog('='.repeat(50), 'info');

            try {
                // Clear local data
                addLog('Clearing local data...', 'info');
                dashboardData.students = [];
                StorageManager.save();
                
                // Clear flags
                localStorage.removeItem('_deleteJustDone');
                window.deleteOperationInProgress = false;
                window.hasPendingLocalChanges = false;

                // Load from Supabase
                addLog('Loading from Supabase...', 'info');
                await loadStudentsFromSupabase();
                
                addLog('✅ Force sync completed', 'success');
                updateCounts();
                
                // Auto analyze
                setTimeout(() => analyzeData(), 1000);
            } catch (error) {
                addLog('❌ Force sync failed: ' + error.message, 'error');
            }
        }

        // Remove Orphan Data
        async function removeOrphans() {
            if (!confirm('Ini akan menghapus data yang hanya ada di local (tidak ada di Supabase). Lanjutkan?')) {
                return;
            }

            addLog('='.repeat(50), 'info');
            addLog('🗑️ REMOVING ORPHAN DATA', 'warning');
            addLog('='.repeat(50), 'info');

            try {
                // Get Supabase IDs
                const { data: supabaseStudents, error } = await window.supabaseClient
                    .from('students')
                    .select('id');

                if (error) throw error;

                const supabaseIds = new Set(supabaseStudents.map(s => parseInt(s.id)));
                addLog('Supabase has ' + supabaseIds.size + ' students', 'info');

                // Filter local data
                const beforeCount = dashboardData.students.length;
                dashboardData.students = dashboardData.students.filter(s => {
                    const keep = supabaseIds.has(parseInt(s.id));
                    if (!keep) {
                        addLog('  Removing orphan: ' + s.name + ' (ID: ' + s.id + ')', 'warning');
                    }
                    return keep;
                });
                const afterCount = dashboardData.students.length;

                addLog('Removed ' + (beforeCount - afterCount) + ' orphan students', 'success');

                // Save
                StorageManager.save();
                recalculateRankings();
                refreshAllData();

                addLog('✅ Orphan removal completed', 'success');
                updateCounts();
                
                // Auto analyze
                setTimeout(() => analyzeData(), 1000);
            } catch (error) {
                addLog('❌ Orphan removal failed: ' + error.message, 'error');
            }
        }

        // Clear Local Storage
        function clearLocalStorage() {
            if (!confirm('⚠️ PERINGATAN!\n\nIni akan menghapus SEMUA data lokal!\nAnda harus reload page setelah ini.\n\nLanjutkan?')) {
                return;
            }

            addLog('💣 Clearing local storage...', 'warning');
            localStorage.clear();
            addLog('✅ Local storage cleared', 'success');
            addLog('🔄 Reloading page in 2 seconds...', 'info');
            
            setTimeout(() => {
                location.reload();
            }, 2000);
        }

        function clearLog() {
            document.getElementById('logOutput').innerHTML = '<div>Log cleared...</div>';
        }

        // Auto-init
        window.addEventListener('load', () => {
            addLog('🚀 Sync & Clean tool loaded', 'info');
            init();
        });
    </script>
</body>
</html>
