<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check Admin Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 p-8">
    <div class="max-w-4xl mx-auto">
        <div class="bg-white rounded-lg shadow-lg p-6 mb-6">
            <h1 class="text-2xl font-bold text-gray-800 mb-4">🔍 Check Admin Profile</h1>
            <p class="text-gray-600 mb-4">Tool untuk memeriksa status admin dan profile</p>
        </div>

        <!-- Status Cards -->
        <div class="grid grid-cols-2 gap-6 mb-6">
            <div class="bg-white rounded-lg shadow-lg p-6">
                <h3 class="text-lg font-bold text-gray-800 mb-4">👤 Current Profile</h3>
                <div id="profileStatus" class="space-y-2">
                    <div class="text-gray-500">Loading...</div>
                </div>
            </div>

            <div class="bg-white rounded-lg shadow-lg p-6">
                <h3 class="text-lg font-bold text-gray-800 mb-4">🔐 Admin Access</h3>
                <div id="adminStatus" class="space-y-2">
                    <div class="text-gray-500">Loading...</div>
                </div>
            </div>
        </div>

        <!-- Actions -->
        <div class="bg-white rounded-lg shadow-lg p-6 mb-6">
            <h2 class="text-xl font-bold text-gray-800 mb-4">Aksi</h2>
            
            <div class="grid grid-cols-2 gap-4">
                <button onclick="checkProfile()" 
                    class="bg-blue-600 text-white px-6 py-3 rounded-lg font-bold hover:bg-blue-700 transition-colors">
                    🔍 Check Profile
                </button>

                <button onclick="loadProfileFromStorage()" 
                    class="bg-green-600 text-white px-6 py-3 rounded-lg font-bold hover:bg-green-700 transition-colors">
                    📦 Load from Storage
                </button>

                <button onclick="createAdminProfile()" 
                    class="bg-purple-600 text-white px-6 py-3 rounded-lg font-bold hover:bg-purple-700 transition-colors">
                    👑 Create Admin Profile
                </button>

                <button onclick="testAdminAccess()" 
                    class="bg-orange-600 text-white px-6 py-3 rounded-lg font-bold hover:bg-orange-700 transition-colors">
                    🧪 Test Admin Access
                </button>
            </div>
        </div>

        <!-- Profile Details -->
        <div class="bg-white rounded-lg shadow-lg p-6 mb-6">
            <h2 class="text-xl font-bold text-gray-800 mb-4">📋 Profile Details</h2>
            <div id="profileDetails" class="bg-gray-100 p-4 rounded font-mono text-xs h-64 overflow-y-auto">
                <div class="text-gray-500">Klik "Check Profile" untuk melihat detail</div>
            </div>
        </div>

        <!-- Log Output -->
        <div class="bg-gray-900 rounded-lg shadow-lg p-6">
            <h2 class="text-xl font-bold text-white mb-4">📋 Log Output</h2>
            <div id="logOutput" class="bg-black text-green-400 p-4 rounded font-mono text-sm h-96 overflow-y-auto">
                <div>Menunggu aksi...</div>
            </div>
            <button onclick="clearLog()" 
                class="mt-4 bg-gray-700 text-white px-4 py-2 rounded hover:bg-gray-600 transition-colors">
                Clear Log
            </button>
        </div>
    </div>

    <script src="js/settings.js"></script>
    <script src="js/data.js"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
    
    <script>
        // Override console.log
        const originalLog = console.log;
        const originalError = console.error;
        
        function addLog(message, type = 'info') {
            const logDiv = document.getElementById('logOutput');
            const timestamp = new Date().toLocaleTimeString();
            const color = type === 'error' ? 'text-red-400' : type === 'success' ? 'text-green-400' : type === 'warning' ? 'text-yellow-400' : 'text-blue-400';
            logDiv.innerHTML += `<div class="${color}">[${timestamp}] ${message}</div>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        console.log = function(...args) {
            originalLog.apply(console, args);
            addLog(args.join(' '), 'info');
        };

        console.error = function(...args) {
            originalError.apply(console, args);
            addLog('ERROR: ' + args.join(' '), 'error');
        };

        // Check Profile
        function checkProfile() {
            addLog('='.repeat(50), 'info');
            addLog('🔍 CHECKING PROFILE', 'warning');
            addLog('='.repeat(50), 'info');

            // Check window.currentProfile
            addLog('Checking window.currentProfile...', 'info');
            if (typeof window.currentProfile !== 'undefined' && window.currentProfile) {
                addLog('✅ window.currentProfile exists', 'success');
                addLog('Profile: ' + JSON.stringify(window.currentProfile, null, 2), 'info');
                
                updateProfileStatus(window.currentProfile);
                updateAdminStatus(window.currentProfile);
                updateProfileDetails(window.currentProfile);
            } else {
                addLog('❌ window.currentProfile not found', 'error');
                updateProfileStatus(null);
                updateAdminStatus(null);
            }

            // Check localStorage
            addLog('Checking localStorage...', 'info');
            const storedProfile = localStorage.getItem('currentProfile');
            if (storedProfile) {
                try {
                    const parsed = JSON.parse(storedProfile);
                    addLog('✅ Profile found in localStorage', 'success');
                    addLog('Stored Profile: ' + JSON.stringify(parsed, null, 2), 'info');
                } catch (error) {
                    addLog('❌ Error parsing stored profile: ' + error.message, 'error');
                }
            } else {
                addLog('❌ No profile in localStorage', 'error');
            }

            // Check currentUser
            addLog('Checking window.currentUser...', 'info');
            if (typeof window.currentUser !== 'undefined' && window.currentUser) {
                addLog('✅ window.currentUser exists', 'success');
                addLog('User: ' + JSON.stringify(window.currentUser, null, 2), 'info');
            } else {
                addLog('❌ window.currentUser not found', 'error');
            }
        }

        // Load Profile from Storage
        function loadProfileFromStorage() {
            addLog('📦 Loading profile from localStorage...', 'info');
            
            const storedProfile = localStorage.getItem('currentProfile');
            if (storedProfile) {
                try {
                    const parsed = JSON.parse(storedProfile);
                    window.currentProfile = parsed;
                    addLog('✅ Profile loaded successfully', 'success');
                    addLog('Loaded: ' + JSON.stringify(parsed, null, 2), 'info');
                    
                    updateProfileStatus(parsed);
                    updateAdminStatus(parsed);
                    updateProfileDetails(parsed);
                } catch (error) {
                    addLog('❌ Error loading profile: ' + error.message, 'error');
                }
            } else {
                addLog('❌ No profile found in localStorage', 'error');
            }
        }

        // Create Admin Profile
        function createAdminProfile() {
            addLog('👑 Creating admin profile...', 'info');
            
            const adminProfile = {
                id: 'admin-' + Date.now(),
                email: 'admin@anugrah.com',
                name: 'Administrator',
                role: 'admin',
                lembaga: 'MTA',
                created_at: new Date().toISOString()
            };

            window.currentProfile = adminProfile;
            localStorage.setItem('currentProfile', JSON.stringify(adminProfile));
            
            addLog('✅ Admin profile created', 'success');
            addLog('Profile: ' + JSON.stringify(adminProfile, null, 2), 'info');
            
            updateProfileStatus(adminProfile);
            updateAdminStatus(adminProfile);
            updateProfileDetails(adminProfile);
        }

        // Test Admin Access
        function testAdminAccess() {
            addLog('🧪 Testing admin access...', 'info');
            
            try {
                // Test showAdminSettings function
                if (typeof showAdminSettings === 'function') {
                    addLog('✅ showAdminSettings function exists', 'success');
                    
                    // Check access condition
                    if (typeof currentProfile === 'undefined' || !currentProfile || currentProfile.role !== 'admin') {
                        addLog('❌ Admin access denied', 'error');
                        addLog('Reason: currentProfile check failed', 'error');
                        
                        if (typeof currentProfile === 'undefined') {
                            addLog('  - currentProfile is undefined', 'error');
                        } else if (!currentProfile) {
                            addLog('  - currentProfile is null/false', 'error');
                        } else if (currentProfile.role !== 'admin') {
                            addLog('  - Role is not admin: ' + currentProfile.role, 'error');
                        }
                    } else {
                        addLog('✅ Admin access granted', 'success');
                        addLog('Calling showAdminSettings()...', 'info');
                        // Don't actually call it, just test the condition
                    }
                } else {
                    addLog('❌ showAdminSettings function not found', 'error');
                }
            } catch (error) {
                addLog('❌ Error testing admin access: ' + error.message, 'error');
            }
        }

        // Update UI functions
        function updateProfileStatus(profile) {
            const div = document.getElementById('profileStatus');
            
            if (profile) {
                div.innerHTML = `
                    <div class="text-green-600 font-bold">✅ Profile Loaded</div>
                    <div class="text-sm text-gray-600">Name: ${profile.name || 'N/A'}</div>
                    <div class="text-sm text-gray-600">Email: ${profile.email || 'N/A'}</div>
                    <div class="text-sm text-gray-600">Role: <span class="font-bold">${profile.role || 'N/A'}</span></div>
                `;
            } else {
                div.innerHTML = `
                    <div class="text-red-600 font-bold">❌ No Profile</div>
                    <div class="text-sm text-gray-600">Profile not loaded</div>
                `;
            }
        }

        function updateAdminStatus(profile) {
            const div = document.getElementById('adminStatus');
            
            if (profile && profile.role === 'admin') {
                div.innerHTML = `
                    <div class="text-green-600 font-bold">✅ Admin Access</div>
                    <div class="text-sm text-gray-600">Full admin privileges</div>
                `;
            } else if (profile) {
                div.innerHTML = `
                    <div class="text-yellow-600 font-bold">⚠️ Limited Access</div>
                    <div class="text-sm text-gray-600">Role: ${profile.role}</div>
                `;
            } else {
                div.innerHTML = `
                    <div class="text-red-600 font-bold">❌ No Access</div>
                    <div class="text-sm text-gray-600">No profile loaded</div>
                `;
            }
        }

        function updateProfileDetails(profile) {
            const div = document.getElementById('profileDetails');
            
            if (profile) {
                div.innerHTML = `<pre>${JSON.stringify(profile, null, 2)}</pre>`;
            } else {
                div.innerHTML = '<div class="text-gray-500">No profile data</div>';
            }
        }

        function clearLog() {
            document.getElementById('logOutput').innerHTML = '<div>Log cleared...</div>';
        }

        // Auto-init
        window.addEventListener('load', () => {
            addLog('🚀 Check Admin Profile tool loaded', 'info');
            checkProfile();
        });
    </script>
</body>
</html>
