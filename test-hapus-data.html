<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Fungsi Hapus Data</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 p-8">
    <div class="max-w-4xl mx-auto">
        <div class="bg-white rounded-lg shadow-lg p-6 mb-6">
            <h1 class="text-2xl font-bold text-gray-800 mb-4">🧪 Test Fungsi Hapus Data</h1>
            <p class="text-gray-600 mb-4">Tool untuk menguji fungsi hapus santri dan halaqah</p>
        </div>

        <!-- Test Hapus Santri -->
        <div class="bg-white rounded-lg shadow-lg p-6 mb-6">
            <h2 class="text-xl font-bold text-gray-800 mb-4">Test Hapus Santri</h2>
            
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">ID Santri:</label>
                <input type="number" id="studentId" 
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                    placeholder="Masukkan ID santri yang akan dihapus">
            </div>

            <button onclick="testDeleteStudent()" 
                class="w-full bg-red-600 text-white px-6 py-3 rounded-lg font-bold hover:bg-red-700 transition-colors">
                🗑️ Test Hapus Santri
            </button>
        </div>

        <!-- Test Hapus Halaqah -->
        <div class="bg-white rounded-lg shadow-lg p-6 mb-6">
            <h2 class="text-xl font-bold text-gray-800 mb-4">Test Hapus Halaqah</h2>
            
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">ID Halaqah:</label>
                <input type="number" id="halaqahId" 
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                    placeholder="Masukkan ID halaqah yang akan dihapus">
            </div>

            <button onclick="testDeleteHalaqah()" 
                class="w-full bg-red-600 text-white px-6 py-3 rounded-lg font-bold hover:bg-red-700 transition-colors">
                🗑️ Test Hapus Halaqah
            </button>
        </div>

        <!-- Log Output -->
        <div class="bg-gray-900 rounded-lg shadow-lg p-6">
            <h2 class="text-xl font-bold text-white mb-4">📋 Log Output</h2>
            <div id="logOutput" class="bg-black text-green-400 p-4 rounded font-mono text-sm h-96 overflow-y-auto">
                <div>Menunggu test...</div>
            </div>
            <button onclick="clearLog()" 
                class="mt-4 bg-gray-700 text-white px-4 py-2 rounded hover:bg-gray-600 transition-colors">
                Clear Log
            </button>
        </div>
    </div>

    <script src="js/settings.js"></script>
    <script src="js/data.js"></script>
    <script src="js/supabase.js"></script>
    
    <script>
        // Override console.log untuk menampilkan di UI
        const originalLog = console.log;
        const originalError = console.error;
        
        function addLog(message, type = 'info') {
            const logDiv = document.getElementById('logOutput');
            const timestamp = new Date().toLocaleTimeString();
            const color = type === 'error' ? 'text-red-400' : type === 'success' ? 'text-green-400' : 'text-blue-400';
            logDiv.innerHTML += `<div class="${color}">[${timestamp}] ${message}</div>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        console.log = function(...args) {
            originalLog.apply(console, args);
            addLog(args.join(' '), 'info');
        };

        console.error = function(...args) {
            originalError.apply(console, args);
            addLog('ERROR: ' + args.join(' '), 'error');
        };

        // Initialize Supabase
        async function initSupabase() {
            try {
                if (!window.supabaseClient) {
                    addLog('Initializing Supabase...', 'info');
                    await initializeSupabase();
                    addLog('✅ Supabase initialized', 'success');
                } else {
                    addLog('✅ Supabase already initialized', 'success');
                }
            } catch (error) {
                addLog('❌ Failed to initialize Supabase: ' + error.message, 'error');
            }
        }

        // Test Delete Student
        async function testDeleteStudent() {
            const studentId = document.getElementById('studentId').value;
            
            if (!studentId) {
                addLog('❌ Masukkan ID santri terlebih dahulu', 'error');
                return;
            }

            addLog('='.repeat(50), 'info');
            addLog('🧪 TESTING DELETE STUDENT', 'info');
            addLog('ID: ' + studentId, 'info');
            addLog('Type: ' + typeof studentId, 'info');
            addLog('='.repeat(50), 'info');

            try {
                await initSupabase();
                
                addLog('Calling deleteStudentFromSupabase...', 'info');
                const result = await deleteStudentFromSupabase(studentId);
                
                if (result) {
                    addLog('✅ DELETE BERHASIL!', 'success');
                    addLog('Student ID ' + studentId + ' telah dihapus dari database', 'success');
                } else {
                    addLog('❌ DELETE GAGAL - Function returned false', 'error');
                }
            } catch (error) {
                addLog('❌ DELETE GAGAL - Exception thrown', 'error');
                addLog('Error: ' + error.message, 'error');
                addLog('Stack: ' + error.stack, 'error');
            }
        }

        // Test Delete Halaqah
        async function testDeleteHalaqah() {
            const halaqahId = document.getElementById('halaqahId').value;
            
            if (!halaqahId) {
                addLog('❌ Masukkan ID halaqah terlebih dahulu', 'error');
                return;
            }

            addLog('='.repeat(50), 'info');
            addLog('🧪 TESTING DELETE HALAQAH', 'info');
            addLog('ID: ' + halaqahId, 'info');
            addLog('Type: ' + typeof halaqahId, 'info');
            addLog('='.repeat(50), 'info');

            try {
                await initSupabase();
                
                addLog('Calling deleteHalaqahFromSupabase...', 'info');
                const result = await deleteHalaqahFromSupabase(halaqahId);
                
                if (result) {
                    addLog('✅ DELETE BERHASIL!', 'success');
                    addLog('Halaqah ID ' + halaqahId + ' telah dihapus dari database', 'success');
                } else {
                    addLog('❌ DELETE GAGAL - Function returned false', 'error');
                }
            } catch (error) {
                addLog('❌ DELETE GAGAL - Exception thrown', 'error');
                addLog('Error: ' + error.message, 'error');
                addLog('Stack: ' + error.stack, 'error');
            }
        }

        function clearLog() {
            document.getElementById('logOutput').innerHTML = '<div>Log cleared...</div>';
        }

        // Auto-init on load
        window.addEventListener('load', () => {
            addLog('🚀 Test page loaded', 'info');
            addLog('Ready to test delete functions', 'info');
            initSupabase();
        });
    </script>
</body>
</html>
